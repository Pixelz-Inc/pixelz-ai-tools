name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-platform-mcp:
    name: Build Platform MCP (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-servers/platform/node/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: mcp-servers/platform/node
      - name: Build TypeScript
        run: npm run build
        working-directory: mcp-servers/platform/node

  build-automation-mcp:
    name: Build Automation MCP (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-servers/automation/node/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: mcp-servers/automation/node
      - name: Build TypeScript
        run: npm run build
        working-directory: mcp-servers/automation/node

  test-node:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    needs: [build-platform-mcp, build-automation-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            mcp-servers/platform/node/package-lock.json
            mcp-servers/automation/node/package-lock.json
            tests/node/package-lock.json
      - name: Install MCP server dependencies
        run: |
          npm install --prefix mcp-servers/platform/node
          npm install --prefix mcp-servers/automation/node
      - name: Build MCP servers
        run: |
          npm run build --prefix mcp-servers/platform/node
          npm run build --prefix mcp-servers/automation/node
      - name: Install test dependencies
        run: npm install
        working-directory: tests/node
      - name: Run tests
        run: npx vitest run
        working-directory: tests/node

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/python/requirements.txt
          pip install -r mcp-servers/platform/python/requirements.txt
          pip install -r mcp-servers/automation/python/requirements.txt
      - name: Run tests
        run: python -m pytest tests/python/ -v
