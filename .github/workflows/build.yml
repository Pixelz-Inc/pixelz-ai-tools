name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-platform-mcp:
    name: Build Platform MCP (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: mcp-servers/platform/node/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: mcp-servers/platform/node
      - name: Build TypeScript
        run: pnpm run build
        working-directory: mcp-servers/platform/node

  build-automation-mcp:
    name: Build Automation MCP (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: mcp-servers/automation/node/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: mcp-servers/automation/node
      - name: Build TypeScript
        run: pnpm run build
        working-directory: mcp-servers/automation/node

  test-node:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    needs: [build-platform-mcp, build-automation-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            mcp-servers/platform/node/pnpm-lock.yaml
            mcp-servers/automation/node/pnpm-lock.yaml
            tests/node/pnpm-lock.yaml
      - name: Install MCP server dependencies
        run: |
          cd mcp-servers/platform/node && pnpm install --frozen-lockfile
          cd ../../../mcp-servers/automation/node && pnpm install --frozen-lockfile
      - name: Build MCP servers
        run: |
          cd mcp-servers/platform/node && pnpm run build
          cd ../../../mcp-servers/automation/node && pnpm run build
      - name: Install test dependencies
        run: pnpm install --frozen-lockfile
        working-directory: tests/node
      - name: Run tests
        run: pnpm exec vitest run
        working-directory: tests/node

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/python/requirements.txt
          pip install -r mcp-servers/platform/python/requirements.txt
          pip install -r mcp-servers/automation/python/requirements.txt
      - name: Run tests
        run: python -m pytest tests/python/ -v
